<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>About</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
   <div class="container">
      <header>
         <h1>The About Page</h1>
      </header>

      <section>
         <form method="post" action="https://webdevbasics.net/scripts/demo.php">
            <div class="mb-3">
               <label for="myName" class="form-label">Name:</label>
               <input type="text" name="myName" id="myName" class="form-control">
            </div>

            <div class="mb-3">
   <label id="emailBox" for="myEmail" class="form-label">Email:</label>
   <input
      type="text"
      name="myEmail"
      id="myEmail"
      class="form-control"
      onmouseenter="document.getElementById('emailBox').innerHTML='Email: Please enter a valid email address';"
      onmouseleave="document.getElementById('emailBox').innerHTML='Email:';"
   >
</div>

            Choose the browsers you use<br>

            <div class="mb-3 form-check">
               <input type="checkbox" name="go" id="go" value="yes" class="form-check-input">
               <label for="go" class="form-check-label">Google Chrome</label>
            </div>

            <div class="mb-3 form-check">
               <input type="checkbox" name="firefox" id="firefox" value="yes" class="form-check-input">
               <label for="firefox" class="form-check-label">Firefox</label>
            </div>

            <div class="mb-3 form-check">
               <input type="checkbox" name="edge" id="edge" value="yes" class="form-check-input">
               <label for="edge" class="form-check-label">Microsoft Edge</label>
            </div>

            Would you like to be on our mailing list:<br>

            <div class="mb-3">
               <div class="form-check">
                  <input type="radio" name="mailingList" id="mailingListyes" value="yes" class="form-check-input">
                  <label for="mailingListyes" class="form-check-label">Yes</label>
               </div>

               <div class="form-check">
                  <input type="radio" name="mailingList" id="mailingListno" value="no" class="form-check-input">
                  <label for="mailingListno" class="form-check-label">No</label>
               </div>
            </div>

            <div class="mb-3 input-group">
               <span class="input-group-text">Your Comments:</span>
               <textarea id="myComment" class="form-control"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>
            <button type="reset" class="btn btn-secondary">Reset</button>
         </form>
      </section>
   </div>
</body>
</html>
